<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omedox - znajdź informacje o osobach na ome.tv poprzez ich adres IP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen font-mono overflow-x-hidden">

    <header class="p-6 border-b border-cyan-500/30 shadow-[0_0_15px_rgba(0,255,255,0.1)] flex flex-col md:flex-row justify-between items-center gap-4 sticky top-0 bg-gray-950/80 backdrop-blur-md z-40">
        <h1 class="text-3xl font-bold neon-text">omedox</h1>
        <div class="flex gap-2 w-full md:w-auto">
            <input type="text" id="searchInput" placeholder="Szukaj po IP..." class="bg-gray-900 border border-cyan-500/50 rounded px-4 py-2 text-cyan-400 focus:outline-none focus:border-cyan-400 neon-border w-full md:w-64">
            <button id="searchBtn" class="bg-cyan-600 hover:bg-cyan-500 text-white px-4 py-2 rounded transition-all">Szukaj</button>
        </div>
        <button id="openFormBtn" class="bg-fuchsia-600 hover:bg-fuchsia-500 text-white px-6 py-2 rounded neon-btn transition-all whitespace-nowrap">+ Stwórz Kartę</button>
    </header>

    <main class="p-8 max-w-7xl mx-auto">
        <div id="cardsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <div id="formModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden z-50 flex justify-center items-center p-4">
        <div class="glass-panel p-8 rounded-xl w-full max-w-md max-h-[90vh] overflow-y-auto">
            <h2 class="text-2xl mb-6 neon-text">Nowa Karta Tożsamości</h2>
            <form id="createCardForm" class="flex flex-col gap-4">
                <div>
                    <label class="text-xs text-cyan-400">Zdjęcie Profilowe</label>
                    <input type="file" id="f_photo" accept="image/*" class="w-full text-sm mt-1" required>
                </div>
                <input type="text" id="f_name" placeholder="Imię (np. Kuba)" class="input-field">
                <input type="text" id="f_gender" placeholder="Płeć (np. Mężczyzna)" class="input-field">
                <input type="text" id="f_age" placeholder="Wiek (np. 21)" class="input-field">
                <div>
                    <input type="text" id="f_ip" placeholder="Adres IP (aby inni mogli Cię znaleźć)" class="input-field" required>
                    <p class="text-[10px] text-gray-400 mt-1">*Upewnij się, że wpisujesz poprawne IP</p>
                </div>
                <input type="text" id="f_location" placeholder="Okolice (np. Warszawa / Mazowieckie)" class="input-field">
                <input type="text" id="f_socials" placeholder="Social Media / Opis (opcjonalnie)" class="input-field">
                
                <div class="flex gap-4 mt-4">
                    <button type="button" id="closeFormBtn" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded w-1/3">Anuluj</button>
                    <button type="submit" id="submitBtn" class="bg-cyan-600 hover:bg-cyan-500 px-4 py-2 rounded w-2/3 neon-btn">Wygeneruj Kartę</button>
                </div>
            </form>
        </div>
    </div>

    <div id="viewModal" class="fixed inset-0 bg-black/90 backdrop-blur-md hidden z-50 flex justify-center items-center p-4 cursor-pointer" onclick="closeViewModal(event)">
        </div>

    <script src="main.js"></script>
</body>
</html>
